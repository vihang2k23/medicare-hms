# One Web service: Vite build + JSON Server on the same URL (no separate static site).
# Do not set VITE_JSON_SERVER_URL — the app uses same-origin `/api/...` in production.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: medicare-hms
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run server
    healthCheckPath: /api/patients
